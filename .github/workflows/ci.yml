name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Or the specific version your project uses (e.g., '9.0.x' based on your dotnet version)

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./backend

      - name: Build
        run: dotnet build --no-restore
        working-directory: ./backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Safe LTS version, consider adapting if your project strictly requires >20

      - name: Install Frontend Dependencies
        run: npm ci # Uses package-lock.json for reliable installs. Change to npm install if no lockfile exists yet.
        working-directory: ./frontend

      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend
